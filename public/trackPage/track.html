<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="./track.css">
    <title class="track-title"></title>
</head>
<body>
    
    <header>
        <a href="../index.html">
            <img src="../images/logo.png" alt="racing-circuits-logo" id="logo">
        </a>
    </header>
    
    <a href="../index.html">
        <svg id="back-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">! Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc.<path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l128 128c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 73.4-73.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-128 128z"/></svg>
    </a>

    <main>
        <h1 class="track-title"></h1>
  
<!-- Track Images Section -->
        <section id="track-images">
            <div class="track-img-wrapper">
                <img src="" class="track-img">
            </div>
  
            <div class="track-img-wrapper">
                <section id="carousel">
                    <section class="slider">
                        <div class="slide">
                            <img src="" class="carousel-img carousel1">
                        </div>
                        <div class="slide">
                            <img src="" class="carousel-img carousel2">
                        </div>
                        <div class="slide">
                            <img src="" class="carousel-img carousel3">
                        </div>
  
                        <button class="btn btn-next"> > </button>
                        <button class="btn btn-prev"> < </button>
                    </section>
                </section>
            </div>
        </section>

<!-- Track Facts Section -->
        <section id="facts-container">
            <div id="track-facts">
                <h2 class="facts-title">Track Facts:</h2>
                <p class="fact-description">Race Track Type:</p> <p class="fact type"></p><br>
                <p class="fact-description">Capacity:</p> <p class="fact capacity"></p><br>
                <p class="fact-description">Distance:</p> <p class="fact distance"></p><br>
                <p class="fact-description">Track Surface:</p> <p class="fact surface"></p><br>
                <p class="fact-description">Top Events:</p> <p class="fact events"></p><br>
                <p class="fact-description">Opened:</p> <p class="fact opened"></p><br>
  
            </div>
            <div id="random-facts">
                <h2 class="facts-title">Random Facts:</h2>
                <ul>
                    <li id="random1"></li>
                    <li id="random2"></li>
                    <li id="random3"></li>
                </ul>
            </div>
        </section>

<!-- Quiz Starts Here -->
        <section id="quiz-container">
            <h3 class="quiz-intro">Test your knowledge about <span class="track-title quiz-intro"></span></h3>

            <div class="quiz">
                <div id="question-container" class="hide">
                    <p class="question-header">Question 
                        <span id="question-number" class="question-header"></span> of 3: 
                        <span id="quiz-question" class="question-header"></span>
                    </p>

                    <form id="quiz-answers">
                    </form>
                </div>
                
                <div id="button-container">
                    <button class="quiz-btn" id="quiz-start-btn">Start</button>
                    <button class="quiz-btn hide" id="quiz-next-btn">Next</button>
                </div>   
            </div>
        </section>
    </main>

    <footer>
        <p>codyfackrell, 2023</p>
    </footer>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="track.js"></script>
</body>
</html>
