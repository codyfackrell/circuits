    <title>Track Site</title>
</head>
<body>
    
    <header>
        <a href="../index.html">
            <img src="../images/logo.png" alt="racing-circuits-logo" id="logo">
        </a>
    </header>
    
    <a href="../index.html">

    <main id="track-page-container">
        <section id="track-info-section">
        </section>


<!-- Quiz Starts Here -->

        <section id="quiz-container">
            <h3 id="quiz-intro">Test your knowledge about Daytona International Speedway</h3>

            <div class="quiz">
                <p id="quiz-question">Question 1: Where in the world is Daytona?</p>

                <form id="quiz-answers">
                    <input type="radio" name="answer" id="answer1">
                        <label for="answer1">Utah</label>
                    <input type="radio" name="answer" id="answer2">
                        <label for="answer2">Florida</label>
                    <input type="radio" name="answer" id="answer3">
                        <label for="answer3">California</label>
                    <input type="radio" name="answer" id="answer4">
                        <label for="answer4">Iowa</label>
                </form>
                
                <div id="button-container">
                    <input type="button" value="Submit" id="quiz-btn">
                </div>   
            </div>
        </section>
    </main>

    <footer>
        <p>codyfackrell, 2023</p>
    </footer>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="track.js"></script>
